name: PR Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        # Golden screenshots are generated on macOS and don't match
        # pixel-for-pixel on Linux runners, so they only run locally.
        run: flutter test --exclude-tags golden test/

      - name: Build web
        run: flutter build web
