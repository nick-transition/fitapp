name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'marketing/**'
      - '.github/workflows/deploy-marketing.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        run: npm --prefix marketing ci

      - name: Build site
        run: npm --prefix marketing run build

      - name: Deploy to Firebase Hosting (marketing)
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: fitapp-ns
          target: marketing
