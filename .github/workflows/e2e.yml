name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies (for seed script)
        run: cd functions && npm ci

      - name: Install Playwright and dependencies
        run: npm ci && npx playwright install --with-deps chromium

      - name: Build web app with emulator support
        run: flutter build web --dart-define=USE_EMULATORS=true

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only auth,firestore --project fitapp-ns &
          for i in $(seq 1 30); do
            if curl -s http://localhost:9099/ > /dev/null 2>&1; then
              echo "Emulators ready"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Emulators failed to start"
          exit 1

      - name: Seed emulator data
        run: |
          FIRESTORE_EMULATOR_HOST=localhost:8081 \
          FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 \
          node scripts/seed_emulator.js

      - name: Run Playwright e2e tests
        run: npx playwright test e2e/ --reporter=list

      - name: Prepare video
        if: always()
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          mkdir -p e2e-videos
          for f in test-results/*/video.webm; do
            name=$(basename $(dirname "$f"))
            ffmpeg -y -i "$f" -c:v libx264 -crf 23 -pix_fmt yuv420p \
              "e2e-videos/${name}.mp4" 2>/dev/null || true
          done
          if ls e2e-videos/*.mp4 1>/dev/null 2>&1; then
            for f in e2e-videos/*.mp4; do echo "file '$f'"; done > e2e-videos/concat.txt
            ffmpeg -y -f concat -safe 0 -i e2e-videos/concat.txt \
              -c copy e2e-videos/walkthrough.mp4 2>/dev/null || true
            rm -f e2e-videos/concat.txt
          fi

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const status = '${{ job.status }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pr = context.issue.number;

            let body = `## E2E Test Results\n\n**Status:** ${status}\n\n`;

            // Upload video to GitHub's user-content CDN via the upload API
            const videoPath = 'e2e-videos/walkthrough.mp4';
            if (fs.existsSync(videoPath)) {
              try {
                // Use GitHub's asset upload endpoint (same as drag-and-drop in browser)
                const repo = `${context.repo.owner}/${context.repo.repo}`;
                const result = execSync(
                  `curl -s -X POST ` +
                  `-H "Authorization: token ${process.env.GITHUB_TOKEN}" ` +
                  `-H "Accept: application/vnd.github.v3+json" ` +
                  `-H "Content-Type: multipart/form-data" ` +
                  `-F "file=@${videoPath};type=video/mp4" ` +
                  `"https://uploads.github.com/repos/${repo}/issues/${pr}/assets"`,
                  { encoding: 'utf-8', timeout: 30000 }
                );
                console.log('Upload response:', result);
                const parsed = JSON.parse(result);
                if (parsed.url || parsed.href) {
                  body += `### Walkthrough Video\n\n${parsed.url || parsed.href}\n\n`;
                }
              } catch (e) {
                console.log('CDN upload not available, falling back to artifact link');
                console.log('Error:', e.message);
              }
            }

            body += `📦 [Download artifacts](${runUrl}#artifacts) (videos, screenshots, reports)\n`;

            // Upsert the comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c =>
              c.body?.includes('## E2E Test Results') && c.user?.type === 'Bot'
            );

            const commentParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({
                ...commentParams,
                comment_id: existing.id,
              });
            } else {
              await github.rest.issues.createComment({
                ...commentParams,
                issue_number: pr,
              });
            }

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
            e2e-videos/
          retention-days: 7
