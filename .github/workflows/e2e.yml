name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies (for seed script)
        run: cd functions && npm ci

      - name: Install Playwright and dependencies
        run: npm ci && npx playwright install --with-deps chromium

      - name: Build web app with emulator support
        run: flutter build web --dart-define=USE_EMULATORS=true

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only auth,firestore --project fitapp-ns &
          for i in $(seq 1 30); do
            if curl -s http://localhost:9099/ > /dev/null 2>&1; then
              echo "Emulators ready"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Emulators failed to start"
          exit 1

      - name: Seed emulator data
        run: |
          FIRESTORE_EMULATOR_HOST=localhost:8081 \
          FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 \
          node scripts/seed_emulator.js

      - name: Run Playwright e2e tests
        run: npx playwright test e2e/ --reporter=list

      - name: Convert videos to mp4
        if: always()
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          mkdir -p e2e-videos
          for f in test-results/*/video.webm; do
            name=$(basename $(dirname "$f"))
            ffmpeg -y -i "$f" -c:v libx264 -crf 23 -pix_fmt yuv420p \
              "e2e-videos/${name}.mp4" 2>/dev/null || true
          done
          # Combine into single walkthrough
          if ls e2e-videos/*.mp4 1>/dev/null 2>&1; then
            for f in e2e-videos/*.mp4; do echo "file '$f'"; done > e2e-videos/concat.txt
            ffmpeg -y -f concat -safe 0 -i e2e-videos/concat.txt \
              -c copy e2e-videos/walkthrough.mp4 2>/dev/null || true
            rm -f e2e-videos/concat.txt
          fi

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
            e2e-videos/
          retention-days: 7

      - name: Post video to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = `e2e-run-${context.runId}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let videoUrl = '';

            // Upload video as a GitHub Release asset for direct browser viewing
            const videoPath = 'e2e-videos/walkthrough.mp4';
            if (fs.existsSync(videoPath)) {
              try {
                // Clean up old e2e releases (keep last 5)
                const { data: releases } = await github.rest.repos.listReleases({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                const oldRuns = releases
                  .filter(r => r.tag_name.startsWith('e2e-run-'))
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                  .slice(5);
                for (const old of oldRuns) {
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: old.id,
                  });
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `tags/${old.tag_name}`,
                    });
                  } catch {}
                }

                // Create a new release
                const { data: release } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `E2E Walkthrough — PR #${context.issue.number}`,
                  body: `Auto-generated by E2E Tests workflow.\nRun: ${runUrl}`,
                  draft: false,
                  prerelease: true,
                });

                // Upload the video
                const videoData = fs.readFileSync(videoPath);
                const { data: asset } = await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.data ? release.data.id : release.id,
                  name: 'e2e-walkthrough.mp4',
                  data: videoData,
                  headers: { 'content-type': 'video/mp4' },
                });
                videoUrl = asset.browser_download_url;
              } catch (e) {
                console.log('Failed to upload video to release:', e.message);
              }
            }

            // Build the comment body
            let body = `## E2E Test Results\n\n`;
            body += `**Status:** ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}\n\n`;

            if (videoUrl) {
              body += `### Walkthrough Video\n\n`;
              body += `${videoUrl}\n\n`;
            }

            body += `📦 [Full artifacts](${runUrl}#artifacts) (screenshots, reports, individual videos)\n`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('## E2E Test Results') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
