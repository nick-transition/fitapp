name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies (for seed script)
        run: cd functions && npm ci

      - name: Install Playwright and dependencies
        run: npm ci && npx playwright install --with-deps chromium

      - name: Build web app with emulator support and semantics
        run: flutter build web --dart-define=USE_EMULATORS=true --dart-define=ENABLE_SEMANTICS=true

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only auth,firestore --project fitapp-ns &
          for i in $(seq 1 60); do
            if curl -s http://localhost:9099/ > /dev/null 2>&1 \
              && curl -s http://localhost:8081/ > /dev/null 2>&1; then
              echo "Emulators ready"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Emulators failed to start"
          exit 1

      # Seeding happens in Playwright's globalSetup (e2e/global-setup.ts),
      # which clears the emulators and reseeds before every run.
      - name: Run Playwright e2e tests
        run: npx playwright test --project=e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload failure traces and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
